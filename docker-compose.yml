version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    container_name: portfolio-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
    volumes:
      # Mount app code for hot reload in dev
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s